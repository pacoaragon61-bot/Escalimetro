<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Escalímetro Pro Musical</title>
    <style>
        :root { --alto-nota: 42px; --ancho-esca: 320px; --oro: #d4af37; --pergamino: #f4e4bc; }
        body { font-family: 'Georgia', serif; background: #1a120b; display: flex; flex-direction: column; align-items: center; padding: 5px; color: #3d2b1f; user-select: none; margin: 0; overscroll-behavior: none; }
        
        /* Panel adaptable */
        #panel-control { background: #3d2b1f; padding: 10px; border-radius: 4px; margin-bottom: 10px; border: 4px double var(--oro); width: 98%; box-shadow: 0 8px 25px rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; box-sizing: border-box; }
        #tonalidad { font-size: 22px; font-variant: small-caps; font-weight: bold; color: var(--oro); border-bottom: 1px solid var(--oro); padding-bottom: 4px; text-align: center; margin-bottom: 10px; }
        
        #wrapper-tonalidad { display: flex; align-items: center; gap: 15px; width: 100%; justify-content: center; }
        .btn-enarmonico { background: var(--oro); border: 2px solid #2b1d0e; color: #1a120b; border-radius: 4px; padding: 4px 10px; cursor: pointer; font-weight: bold; font-size: 16px; }
        
        .grupo-botones { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; margin-top: 8px; width: 100%; }
        button { padding: 5px 8px; background: transparent; color: #bca080; border: 1px solid #5a4030; cursor: pointer; font-size: 10px; border-radius: 3px; min-width: 70px; }
        button.active { background: var(--oro); color: #2b1d0e; font-weight: bold; }

        #cuerpo-herramienta { display: flex; flex-direction: column; width: 100%; align-items: center; gap: 10px; }
        
        #escenario { position: relative; width: var(--ancho-esca); height: 420px; border: 6px solid #2b1d0e; background: var(--pergamino); overflow: hidden; }
        #viewport { width: 100%; height: 100%; overflow-y: scroll; scrollbar-width: none; }
        #viewport::-webkit-scrollbar { display: none; }
        #columna-notas { position: relative; width: 100%; height: 1050px; }
        
        .nota { height: 42px; width: 100%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; color: rgba(61, 43, 31, 0.2); position: absolute; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .nota.resaltada { color: #000 !important; background: #fff !important; font-size: 16px; z-index: 5; }
        .nota.tonica-roja { color: #cc0000 !important; font-size: 18px !important; z-index: 10; font-weight: 900; }
        
        #molde { position: absolute; bottom: 0; left: 5px; right: 5px; height: calc(42px * 13); background: rgba(184, 115, 51, 0.05); border: 2px solid #8b4513; z-index: 100; pointer-events: none; }
        .hueco { position: absolute; width: 94%; height: 38px; left: 3%; border: 1px solid #2b1d0e; background: rgba(255,255,255,0.3); pointer-events: auto; }
        
        #area-musical { width: 98%; display: flex; flex-direction: column; gap: 8px; }
        .box-pentagrama { background: var(--pergamino); border: 3px double #2b1d0e; padding: 5px; text-align: center; }
        .box-pentagrama span { font-weight: bold; font-size: 11px; color: #3d2b1f; display: block; margin-bottom: 2px; }
        canvas { width: 100%; height: 120px; }
    </style>
</head>
<body>
    <div id="panel-control">
        <div id="tonalidad">Cargando...</div>
        <div id="wrapper-tonalidad">
            <div class="btn-enarmonico" onclick="ajustarEnarmonia(-1)">♭</div>
            <div class="btn-enarmonico" onclick="reproducirEscala()">🔊</div>
            <div class="btn-enarmonico" onclick="ajustarEnarmonia(1)">♯</div>
        </div>
        <div class="grupo-botones">
            <button onclick="cambiarEscala('mayor', this)" class="active">MAYOR</button>
            <button onclick="cambiarEscala('dorico', this)">DÓRICO</button>
            <button onclick="cambiarEscala('frigio', this)">FRIGIO</button>
            <button onclick="cambiarEscala('menorNat', this)">MENOR NAT.</button>
            <button onclick="cambiarEscala('mixolidio', this)">MIXOLIDIO</button>
            <button onclick="cambiarEscala('menorArm', this)">MENOR ARM.</button>
        </div>
    </div>

    <div id="cuerpo-herramienta">
        <div id="escenario">
            <div id="molde"></div>
            <div id="viewport"><div id="columna-notas"></div></div>
        </div>
        <div id="area-musical">
            <div class="box-pentagrama"><span>Escala / Armadura</span><canvas id="canvasEscala" width="600" height="180"></canvas></div>
        </div>
    </div>

<script>
    const DATOS_NOTAS = [{s:"DO",b:"DO",alt:0},{s:"DO#",b:"REb",alt:7},{s:"RE",b:"RE",alt:2},{s:"RE#",b:"MIb",alt:-3},{s:"MI",b:"MI",alt:4},{s:"FA",b:"FA",alt:-1},{s:"FA#",b:"SOLb",alt:6},{s:"SOL",b:"SOL",alt:1},{s:"SOL#",b:"LAb",alt:-4},{s:"LA",b:"LA",alt:3},{s:"LA#",b:"SIb",alt:-2},{s:"SI",b:"SI",alt:5}];
    const ESTRUCTURAS = {mayor:[0,2,4,5,7,9,11,12],menorNat:[0,2,3,5,7,8,10,12],dorico:[0,2,3,5,7,9,10,12],frigio:[0,1,3,5,7,8,10,12],mixolidio:[0,2,4,5,7,9,10,12],menorArm:[0,2,3,5,7,8,11,12]};
    const MODS = {mayor:0,menorNat:-3,dorico:-2,frigio:-4,mixolidio:-1,menorArm:-3};
    
    const view = document.getElementById('viewport');
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let escalaActiva = 'mayor', enarmoniaManual = 0;

    function ajustarEnarmonia(v){ enarmoniaManual = v; draw(); }

    function draw(){
        const tIdx = 24 - Math.round((view.scrollTop + 378) / 42); // Ajustado para el nuevo alto
        const norm = (tIdx % 12 + 12) % 12;
        const notaT = DATOS_NOTAS[norm];
        let prefS = (notaT.alt + MODS[escalaActiva] >= 0);
        if(enarmoniaManual===1) prefS=true; if(enarmoniaManual===-1) prefS=false;
        
        let dT = prefS ? notaT.s : notaT.b;
        document.getElementById('tonalidad').innerText = dT + " " + escalaActiva.toUpperCase();
        
        const col=document.getElementById('columna-notas'); col.innerHTML='';
        const estA=ESTRUCTURAS[escalaActiva];
        
        for(let i=24;i>=0;i--){
            const d=document.createElement('div');
            const rel=i-tIdx;
            const esE=estA.includes(rel);
            d.className='nota'+(esE?' resaltada':'')+(rel===0?' tonica-roja':'');
            if(esE) {
                d.innerText = (prefS ? DATOS_NOTAS[i%12].s : DATOS_NOTAS[i%12].b) + (i>=12?"'":"");
            } else {
                d.innerText = DATOS_NOTAS[i%12].s + "/" + DATOS_NOTAS[i%12].b;
            }
            d.style.bottom=(i*42)+"px"; 
            col.appendChild(d);
        }
        dibujarPentagrama(norm, prefS);
    }

    function dibujarPentagrama(norm, prefS){
        const ctx=document.getElementById('canvasEscala').getContext('2d');
        ctx.clearRect(0,0,600,180);
        ctx.strokeStyle='#000'; ctx.lineWidth=2;
        for(let i=0;i<5;i++){ let y=60+i*15; ctx.beginPath(); ctx.moveTo(20,y); ctx.lineTo(580,y); ctx.stroke(); }
        ctx.fillStyle='#000'; ctx.font='60px serif'; ctx.fillText('𝄞', 30, 115);
    }

    function play(f,t=0){
        const o=audioCtx.createOscillator(),g=audioCtx.createGain();
        o.type='triangle'; o.frequency.value=f;
        g.gain.setValueAtTime(0.1,audioCtx.currentTime+t);
        g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+t+0.6);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(audioCtx.currentTime+t); o.stop(audioCtx.currentTime+t+0.6);
    }

    function reproducirEscala(){
        const b = 24 - Math.round((view.scrollTop + 378) / 42);
        ESTRUCTURAS[escalaActiva].forEach((n,i)=>play(261.63*Math.pow(2,(b+n-12)/12),i*0.4));
    }

    function cambiarEscala(tipo,btn){
        escalaActiva=tipo; enarmoniaManual=0;
        document.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        const m=document.getElementById('molde'); m.innerHTML='';
        ESTRUCTURAS[tipo].forEach(inter=>{
            const h=document.createElement('div'); h.className='hueco'; h.style.bottom=(inter*42)+"px";
            m.appendChild(h);
        });
        draw();
    }

    view.addEventListener('scroll', ()=>{
        enarmoniaManual=0; draw();
        clearTimeout(window.sn);
        window.sn=setTimeout(()=>view.scrollTo({top:Math.round(view.scrollTop/42)*42,behavior:'smooth'}),150);
    });

    window.onload=()=>{ cambiarEscala('mayor',document.querySelector('button')); view.scrollTop=view.scrollHeight; };
</script>
</body>
</html>
