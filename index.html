<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#d4af37">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <title>Escalímetro Pro</title>
    <style>
        :root { --alto-nota: 42px; --ancho-total: 1050px; --ancho-esca: 380px; --oro: #d4af37; --pergamino: #f4e4bc; }
        body { font-family: 'Georgia', serif; background: #1a120b; display: flex; flex-direction: column; align-items: center; padding: 10px; color: #3d2b1f; user-select: none; margin: 0; overscroll-behavior: none; }
        #panel-control { background: #3d2b1f; padding: 12px 20px; border-radius: 4px; margin-bottom: 10px; border: 4px double var(--oro); width: 95%; max-width: var(--ancho-total); box-shadow: 0 8px 25px rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; box-sizing: border-box; }
        #tonalidad { font-size: 24px; font-weight: bold; color: var(--oro); margin: 10px 0; text-align: center; }
        #cuerpo-herramienta { display: flex; flex-wrap: wrap; width: 100%; gap: 15px; justify-content: center; }
        #escenario { position: relative; width: var(--ancho-esca); height: 500px; border: 8px solid #2b1d0e; background: var(--pergamino); overflow: hidden; }
        #viewport { width: 100%; height: 100%; overflow-y: scroll; scrollbar-width: none; }
        #columna-notas { position: relative; width: 100%; height: 1050px; }
        .nota { height: 42px; width: 100%; display: flex; align-items: center; justify-content: center; font-weight: bold; position: absolute; }
        .nota.resaltada { color: #000; background: #fff; z-index: 5; }
        .nota.tonica-roja { color: #cc0000 !important; font-weight: 900; }
        #area-musical { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 12px; }
        .box-pentagrama { background: var(--pergamino); border: 4px double #2b1d0e; padding: 5px; }
        canvas { width: 100%; height: auto; }
        .grupo-botones { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-top: 10px; }
        button { padding: 8px; background: #5a4030; color: #fff; border: none; border-radius: 4px; font-size: 10px; cursor: pointer; }
        button.active { background: var(--oro); color: #000; }
    </style>
</head>
<body>
    <div id="panel-control">
        <div id="tonalidad">Cargando Escalímetro...</div>
        <div class="grupo-botones">
            <button onclick="cambiarEscala('mayor', this)" class="active">MAYOR</button>
            <button onclick="cambiarEscala('menorNat', this)">MENOR NAT.</button>
            <button onclick="reproducirEscala()">🔊 TOCAR</button>
        </div>
    </div>
    <div id="cuerpo-herramienta">
        <div id="escenario"><div id="viewport"><div id="columna-notas"></div></div></div>
        <div id="area-musical">
            <div class="box-pentagrama"><canvas id="canvasEscala" width="600" height="150"></canvas></div>
        </div>
    </div>
    <script>
        // Lógica simplificada para asegurar que cargue
        const DATOS = ["DO","DO#","RE","RE#","MI","FA","FA#","SOL","SOL#","LA","LA#","SI"];
        const col = document.getElementById('columna-notas');
        function draw() {
            col.innerHTML = '';
            for(let i=24; i>=0; i--) {
                const d = document.createElement('div');
                d.className = 'nota';
                d.style.bottom = (i * 42) + 'px';
                d.innerText = DATOS[i%12];
                if(i%12 === 0) d.classList.add('tonica-roja');
                col.appendChild(d);
            }
            document.getElementById('tonalidad').innerText = "C MAYOR";
        }
        window.onload = draw;
        function cambiarEscala(tipo, btn) {
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
</body>
</html>
